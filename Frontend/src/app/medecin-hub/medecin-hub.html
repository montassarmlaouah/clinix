<div class="hub-container">
  <header class="hub-header">
    <h1><i class="bi bi-person-badge"></i> Espace médecin</h1>
    <p>Accès centralisé à tous les modules médicaux.</p>
  </header>

  <div class="hub-grid">
    <a *ngFor="let link of links" [routerLink]="link.route" [queryParams]="link.queryParams" class="hub-card">
      <i class="bi" [ngClass]="link.icon"></i>
      <strong>{{ link.title }}</strong>
      <span>{{ link.description }}</span>
    </a>
  </div>
</div>
