<div class="licences-container">
  <nav class="back-nav">
    <a routerLink="/infirmier"><i class="bi bi-arrow-left"></i> Espace infirmier</a>
  </nav>

  <header class="page-header">
    <h1><i class="bi bi-chat-left-text header-icon"></i> Transmissions ciblées (SBAR)</h1>
    <p class="page-subtitle">Relève structurée vers l'équipe médicale.</p>
  </header>

  <div class="alert alert-luna-success" *ngIf="message">
    <i class="bi bi-check-circle me-2"></i>{{ message }}
  </div>

  <section class="luna-card mb-4">
    <h2 class="card-title">Nouvelle transmission</h2>

    <label class="luna-label">Priorité</label>
    <select class="luna-input mb-3" [(ngModel)]="priorite">
      <option value="NORMALE">Normale</option>
      <option value="URGENTE">Urgente</option>
    </select>

    <label class="luna-label">Contenu (SBAR)</label>
    <textarea class="luna-input mb-3" rows="5" [(ngModel)]="contenu"
      placeholder="Situation — Background — Assessment — Recommandation…"></textarea>

    <label class="luna-label">Tags</label>
    <div class="tag-row mb-3">
      <input class="luna-input tag-input" [(ngModel)]="tag" (keyup.enter)="ajouterTag()" placeholder="Appuyer Entrée pour ajouter" />
      <button class="btn-secondary" (click)="ajouterTag()">+</button>
    </div>
    <div class="tags-wrap" *ngIf="tags.length">
      <span class="tag-chip" *ngFor="let t of tags">
        {{ t }} <button class="tag-remove" (click)="retirerTag(t)">×</button>
      </span>
    </div>

    <button class="btn-primary mt-2" (click)="enregistrer()">
      <i class="bi bi-send me-2"></i>Enregistrer la transmission
    </button>
  </section>

  <section *ngIf="historique.length">
    <h2 class="card-title">Historique</h2>
    <div class="trans-item" *ngFor="let h of historique" [class.urgente]="h.priorite === 'URGENTE'">
      <div class="trans-head">
        <span class="trans-date">{{ formatDate(h.date) }}</span>
        <span class="badge" [class.badge-urgente]="h.priorite === 'URGENTE'">{{ h.priorite }}</span>
        <button class="btn-icon" (click)="supprimer(h.id)"><i class="bi bi-trash3"></i></button>
      </div>
      <p class="trans-body">{{ h.contenu }}</p>
      <div class="tags-wrap" *ngIf="h.tags.length">
        <span class="tag-chip" *ngFor="let t of h.tags">{{ t }}</span>
      </div>
    </div>
  </section>

  <p *ngIf="!historique.length" class="empty-hint">Aucune transmission enregistrée dans cette session.</p>
</div>
