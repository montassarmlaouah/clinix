# Profil Docker — surcharge via variables d'environnement (voir docker-compose.yml)

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:db}:${POSTGRES_PORT:5432}/${POSTGRES_DB:PFE2}?sslmode=disable
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:admin}

spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:change-me-in-production-min-32-chars}

app.billing.success-url=${APP_BILLING_SUCCESS_URL:http://localhost/mon-abonnement?checkout=success}
app.billing.cancel-url=${APP_BILLING_CANCEL_URL:http://localhost/mon-abonnement?checkout=cancel}

spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
app.mail.from=${APP_MAIL_FROM:}

gemini.api-key=${GEMINI_API_KEY:}
stripe.secret-key=${STRIPE_SECRET_KEY:}

tunisiesms.enabled=${TUNISIESMS_ENABLED:false}
tunisiesms.api.key=${TUNISIESMS_API_KEY:}
