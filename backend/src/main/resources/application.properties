# ==================== TUNISIESMS (MyStudents) ====================
# Deux activations distinctes sur le portail \u2014 ne pas melanger cle + type :
# - API Rest JSON (doc officielle) : type 55 (ne pas changer), sms[] SANS date_envoi,
#   tunisiesms.api.type=55 et tunisiesms.api.include-date-envoi=false
# - Plugin jQuery (mystudents.tunisiesms.js) : type 51 + date_envoi sur chaque SMS \u2014 cle d'activation dediee
# Utiliser type 51 avec une cle \u00AB API Rest JSON \u00BB (ou l'inverse) peut provoquer erreur 500 cote TunisieSMS.
# Authorization: Bearer <cle> \u2014 POST https://mystudents.tunisiesms.tn/api/sms \u2014 DLR POST .../api/dlr
# Codes : 200 OK, 400 cle absente, 401 cle invalide, 402 credit, 420 quota, 430 contenu, 431 destination,
#         440 texte long, 441 destination refusee, 442 sender non autorise, 500 erreur serveur
tunisiesms.enabled=true
tunisiesms.transport=rest
tunisiesms.fallback-to-rest=false
tunisiesms.auth.header.prefix=Bearer 
tunisiesms.api.url=https://mystudents.tunisiesms.tn/api/sms
tunisiesms.dlr.url=https://mystudents.tunisiesms.tn/api/dlr
tunisiesms.rest.include-authorization-header=true
tunisiesms.soap.url=
tunisiesms.soap.action=
tunisiesms.soap.namespace=
# Type API : 55 = cle \u00AB API Rest JSON \u00BB (defaut backend). 51 = plugin jQuery uniquement si cette cle est activee
tunisiesms.api.type=55
# true uniquement avec type 51 (script mystudents.tunisiesms.js)
tunisiesms.api.include-date-envoi=false
# En cas de 401 JSON, un second envoi avec l'autre type (51<->55) est tente une fois
tunisiesms.api.retry-on-401-alternate-type=true
# En cas de 500 JSON (erreur interne API), meme reessai 51<->55 (souvent mauvais format pour le compte)
tunisiesms.api.retry-on-500-alternate-type=true
# Cle Bearer : la meme que sur le portail pour l'activation concernee (plugin jQuery si type=51, API Rest JSON si type=55).
# Mettre la valeur entre guillemets si elle contient = ou ! \u2014 sinon risque de lecture incorrecte selon l'editeur.
# Surcharge (prioritaire) : variable d'environnement TUNISIESMS_API_KEY \u2014 ne pas la laisser vide sous peine d'ecraser la cle.
tunisiesms.api.key="32ixCvJqPaSBn5gpKJo49HkmXKZoWhQDrNIlJZ!Nmoc5CkAgD3Rw5tSYlFLGPukCYKo76kDyZJnR3QdbpQabduvflAhJymqKE8LVND51"
# Exp\u00E9diteur (sender JSON) : libell\u00E9 EXACT liste MyStudents \u2014 sinon erreur 442
# Propri\u00E9t\u00E9 Spring : tunisiesms.sender (pas tunisiesms.api.sender)
tunisiesms.sender=TunSMS Test
tunisiesms.fail-on-error=false
# Corps SMS : UTF-8 explicite + suppression des accents (souvent plus stable c\u00F4t\u00E9 agr\u00E9gateur si status JSON 500)
tunisiesms.message.strip-accents=true
# Un seul paragraphe sans retours ligne \u2014 plusieurs APIs SMS renvoient 500 JSON sur texte multiligne
tunisiesms.message.single-line=true
# Dev : contourne erreurs TLS hostname/certificat JDK (en prod : truststore JDK a jour et false)
tunisiesms.ssl.insecure-trust-all=true

# ==================== STRIPE / FACTURATION SAAS ====================
# Ne jamais committer de vraies cl\u00E9s secr\u00E8tes Stripe (sk_live_ / sk_test_) dans le d\u00E9p\u00F4t.
#
# Mode test local (au choix) :
# 0) Fichier stripe-local.properties (recommand\u00E9 si l'IDE n'injecte pas les variables) :
#    copier src/main/resources/stripe-local.properties.example \u2192 stripe-local.properties
# 1) Variables d'environnement (recommand\u00E9) \u2014 cl\u00E9s depuis https://dashboard.stripe.com/test/apikeys
#    STRIPE_SECRET_KEY=sk_test_...
#    STRIPE_PUBLISHABLE_KEY=pk_test_...   (optionnel c\u00F4t\u00E9 API ; utile pour Stripe.js si besoin)
#    STRIPE_WEBHOOK_SECRET=whsec_...      (optionnel ; pour /api/webhooks/stripe en local avec stripe listen)
# 2) Super admin : enregistrer pk_test + sk_test dans l'UI \u2014 n\u00E9cessite une phrase de chiffrement (ci-dessous).
#
# En production : d\u00E9finir STRIPE_FIELD_ENCRYPTION_SECRET (phrase longue unique) et ne pas utiliser la valeur par d\u00E9faut.
# STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY, STRIPE_WEBHOOK_SECRET
# URLs de retour apr\u00E8s Checkout (adapter en prod)
app.billing.success-url=http://localhost:4200/mon-abonnement?checkout=success
app.billing.cancel-url=http://localhost:4200/mon-abonnement?checkout=cancel
# Devise Stripe pour les Prix cr\u00E9\u00E9s par l'API (usd en test le plus fiable ; tnd si activ\u00E9 sur le compte)
app.billing.stripe-currency=usd
# Phrase longue (32+ car.) pour chiffrer les cl\u00E9s en base (super admin). D\u00E9faut = dev local uniquement.
# Si STRIPE_FIELD_ENCRYPTION_SECRET est d\u00E9fini VIDE dans l'IDE, le d\u00E9faut ci-dessous est ignor\u00E9 (chiffrement d\u00E9sactiv\u00E9).
stripe.field-encryption-secret=${STRIPE_FIELD_ENCRYPTION_SECRET:DEVONLY_clinix_pfe_local_stripe_field_cipher_secret_min_32_chars}

