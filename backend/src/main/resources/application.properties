spring.application.name=pfe

# Fichier optionnel (non versionn\u00E9) : src/main/resources/stripe-local.properties
# Copier stripe-local.properties.example \u2192 stripe-local.properties et y mettre STRIPE_SECRET_KEY=sk_test_\u2026
spring.config.import=optional:classpath:stripe-local.properties

server.port=8080
# \u00C9couter sur toutes les interfaces (n\u00E9cessaire pour acc\u00E8s depuis t\u00E9l\u00E9phone / autre machine sur le Wi\u2011Fi)
server.address=0.0.0.0

# Un seul mapping /** pour les fichiers statiques : celui d\u00E9fini dans SpaWebMvcConfiguration (repli SPA).
# Si true, Spring Boot ajoute un second /** sans repli vers index.html \u2192 404 sur /auth/login, /medecin, etc.
spring.web.resources.add-mappings=false

# Configuration PostgreSQL (datasource principal)
spring.datasource.url=jdbc:postgresql://localhost:5432/PFE2?sslmode=disable
spring.datasource.username=postgres
spring.datasource.password=123456

# Flyway : migrations SQL avant Hibernate (r\u00E9paration sch\u00E9ma / colonnes TunisieSMS)
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JPA / Hibernate (dialecte : auto-d\u00E9tect\u00E9 pour PostgreSQL \u2014 pas besoin de le fixer)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC




# ==================== CONFIGURATION ASYNC ====================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.scheduling.pool.size=2

