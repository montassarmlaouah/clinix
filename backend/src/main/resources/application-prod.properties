# Profil production (Contabo / VPS) — activer avec : SPRING_PROFILES_ACTIVE=prod
# Secrets : variables d'environnement (ne pas committer de mots de passe réels).

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:PFE2}?sslmode=disable
spring.datasource.username=${POSTGRES_USER:clinix}
spring.datasource.password=${POSTGRES_PASSWORD:}

server.port=8080
server.address=0.0.0.0

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

jwt.secret=${JWT_SECRET:change-me-in-production-min-32-chars}

app.billing.success-url=${APP_BILLING_SUCCESS_URL:https://www.cliniix.tech/mon-abonnement?checkout=success}
app.billing.cancel-url=${APP_BILLING_CANCEL_URL:https://www.cliniix.tech/mon-abonnement?checkout=cancel}

spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
app.mail.from=${APP_MAIL_FROM:}

gemini.api-key=${GEMINI_API_KEY:}
stripe.secret-key=${STRIPE_SECRET_KEY:}

# TunisieSMS — activer en production pour envoyer les mots de passe admin/personnel
tunisiesms.enabled=${TUNISIESMS_ENABLED:true}
tunisiesms.api.url=${TUNISIESMS_API_URL:https://mystudents.tunisiesms.tn/api/sms}
tunisiesms.dlr.url=${TUNISIESMS_DLR_URL:https://mystudents.tunisiesms.tn/api/dlr}
tunisiesms.api.key=${TUNISIESMS_API_KEY:}
tunisiesms.sender=${TUNISIESMS_SENDER:TunSMS Test}
tunisiesms.api.type=${TUNISIESMS_API_TYPE:55}
tunisiesms.api.include-date-envoi=false
tunisiesms.api.retry-on-401-alternate-type=true
tunisiesms.api.retry-on-500-alternate-type=true
tunisiesms.message.strip-accents=true
tunisiesms.message.single-line=true
tunisiesms.message.max-length=159
tunisiesms.fail-on-error=false
